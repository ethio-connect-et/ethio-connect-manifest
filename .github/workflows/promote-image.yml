name: Promote Image via PR

on:
  repository_dispatch:
    types: [promote-image]
  workflow_dispatch:
    inputs:
      app:
        description: Application name from repository_dispatch payload
        required: true
        type: string
      digest:
        description: OCI image digest (sha256:...)
        required: true
        type: string
      env:
        description: Target environment
        required: true
        type: choice
        options:
          - testing
          - staging
          - production
      dry_run:
        description: Validate payload and file mapping only (no PR)
        required: false
        type: boolean
        default: true

concurrency:
  group: promote-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.env || github.event.client_payload.env }}-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.app || github.event.client_payload.app }}
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    env:
      APP: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.app || github.event.client_payload.app }}
      DIGEST: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.digest || github.event.client_payload.digest }}
      ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.env || github.event.client_payload.env }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}
      SOURCE_REPO: ${{ github.event.client_payload.source_repo }}
      SOURCE_REF: ${{ github.event.client_payload.source_ref }}
      SOURCE_COMMIT: ${{ github.event.client_payload.source_commit }}
      RELEASE_ID: ${{ github.event.client_payload.release_id }}
      RELEASE_CREATED_AT: ${{ github.event.client_payload.release_created_at }}
      SIGNED_METADATA: ${{ github.event.client_payload.signed_metadata }}
      ATTESTATION_BUNDLE: ${{ github.event.client_payload.attestation_bundle }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Validate repository_dispatch payload schema and policy
        if: ${{ github.event_name == 'repository_dispatch' }}
        id: dispatch_validation
        shell: bash
        run: |
          set +e
          reason="$(python3 .github/scripts/validate_promote_dispatch.py 2>&1)"
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "reason=$reason" >> "$GITHUB_OUTPUT"
            echo "DISPATCH_VALID=false" >> "$GITHUB_ENV"
            echo "VALIDATION_REASON=$reason" >> "$GITHUB_ENV"
          else
            echo "valid=true" >> "$GITHUB_OUTPUT"
            echo "reason=$reason" >> "$GITHUB_OUTPUT"
            echo "DISPATCH_VALID=true" >> "$GITHUB_ENV"
            echo "VALIDATION_REASON=$reason" >> "$GITHUB_ENV"
          fi

      - name: Write dispatch validation summary
        if: ${{ github.event_name == 'repository_dispatch' }}
        run: |
          {
            echo "## repository_dispatch validation"
            echo "- result: ${{ steps.dispatch_validation.outputs.valid == 'true' && 'pass' || 'fail' }}"
            echo "- detail: ${{ steps.dispatch_validation.outputs.reason }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate repository_dispatch sender/provenance policy
        if: ${{ github.event_name == 'repository_dispatch' }}
        env:
          ALLOWED_SOURCE_REPO: ethio-connect-et/ethio-connect
          ALLOWED_ACTOR: ethio-connect-bot
          ALLOWED_GITHUB_APP_SLUG: ethio-connect-promoter
        run: |
          set -euo pipefail
          test -n "$SOURCE_REPO"
          test -n "$SOURCE_REF"
          test -n "$SOURCE_COMMIT"
          test -n "$RELEASE_ID"
          test -n "$RELEASE_CREATED_AT"
          test -n "$SIGNED_METADATA"
          test -n "$ATTESTATION_BUNDLE"

          if [ "$SOURCE_REPO" != "$ALLOWED_SOURCE_REPO" ]; then
            echo "Untrusted source repo: $SOURCE_REPO" >&2
            exit 1
          fi

          # actor/app token policy: require bot actor or github app trigger
          if [ "${{ github.actor }}" != "$ALLOWED_ACTOR" ] && [ "${{ github.event.sender.type }}" != "Bot" ]; then
            echo "Dispatch rejected: actor '${{ github.actor }}' sender type '${{ github.event.sender.type }}' not allowed" >&2
            exit 1
          fi

          if [ "${{ github.event.sender.type }}" = "Bot" ]; then
            EXPECTED_BOT_LOGIN="${ALLOWED_GITHUB_APP_SLUG}[bot]"
            if [ "${{ github.event.sender.login }}" != "$EXPECTED_BOT_LOGIN" ]; then
              echo "Dispatch bot sender login '${{ github.event.sender.login }}' does not match expected app bot '$EXPECTED_BOT_LOGIN'" >&2
              exit 1
            fi
          fi

          echo "$SOURCE_REF" | grep -E '^(refs/heads/main|refs/tags/v[0-9]+\.[0-9]+\.[0-9]+)$'
          echo "$SOURCE_COMMIT" | grep -E '^[a-f0-9]{40}$'
          echo "$RELEASE_ID" | grep -E '^[0-9]+$'
          echo "$RELEASE_CREATED_AT" | grep -E '^[0-9]{4}-[0-9]{2}-[0-9]{2}T'

      - name: Validate payload and discover supported apps
        if: ${{ github.event_name != 'repository_dispatch' || env.DISPATCH_VALID == 'true' }}
        run: |
          set -euo pipefail
          test -n "$APP"
          test -n "$DIGEST"
          test -n "$ENVIRONMENT"
          echo "$ENVIRONMENT" | grep -E '^(testing|staging|production)$'
          echo "$DIGEST" | grep -E '^sha256:[a-f0-9]{64}$'

          mapfile -t SUPPORTED_APPS < <(find "overlays/${ENVIRONMENT}" -mindepth 2 -maxdepth 2 -name patch.yaml -printf '%h\n' | xargs -n1 basename | sort -u)
          if [ "${#SUPPORTED_APPS[@]}" -eq 0 ]; then
            echo "No applications discovered from overlays/${ENVIRONMENT}/*/patch.yaml" >&2
            exit 1
          fi

          if ! printf '%s\n' "${SUPPORTED_APPS[@]}" | grep -Fxq "$APP"; then
            echo "Unsupported app '${APP}' for environment '${ENVIRONMENT}'." >&2
            echo "Supported apps: ${SUPPORTED_APPS[*]}" >&2
            echo "Expected app names map 1:1 to overlays/${ENVIRONMENT}/<app>/patch.yaml directories." >&2
            exit 1
          fi

      - name: Install yq
        if: ${{ github.event_name != 'repository_dispatch' || env.DISPATCH_VALID == 'true' }}
        run: sudo snap install yq

      - name: Verify mandatory attestation and release metadata
        if: ${{ github.event_name == 'repository_dispatch' && env.DISPATCH_VALID == 'true' }}
        run: |
          set -euo pipefail
          FILE="overlays/${ENVIRONMENT}/${APP}/patch.yaml"
          test -f "$FILE"
          BEFORE_DIGEST="$(yq -r '.spec.template.spec.containers[] | select(.name == env(APP)) | .image' "$FILE" | sed -n 's/.*@\(sha256:[a-f0-9]\{64\}\)$/\1/p')"
          test -n "$BEFORE_DIGEST"

          echo "$ATTESTATION_BUNDLE" | grep -F "$DIGEST" >/dev/null
          echo "$ATTESTATION_BUNDLE" | grep -F "$SOURCE_COMMIT" >/dev/null
          echo "$ATTESTATION_BUNDLE" | grep -F "$SOURCE_REF" >/dev/null
          echo "$ATTESTATION_BUNDLE" | grep -F "$RELEASE_ID" >/dev/null
          echo "$ATTESTATION_BUNDLE" | grep -F "$RELEASE_CREATED_AT" >/dev/null

          if [ "$BEFORE_DIGEST" = "$DIGEST" ]; then
            echo "Digest already at desired state; refusing empty promotion." >&2
            exit 1
          fi

      - name: Update manifest patch only (schema-aware)
        if: ${{ github.event_name != 'repository_dispatch' || env.DISPATCH_VALID == 'true' }}
        run: |
          set -euo pipefail
          export IMAGE="ghcr.io/ethio-connect-et/${APP}@${DIGEST}"
          FILE="overlays/${ENVIRONMENT}/${APP}/patch.yaml"
          test -f "$FILE"

          BEFORE_COUNT="$(yq -r '.spec.template.spec.containers[] | select(.name == env(APP)) | .image' "$FILE" | wc -l | tr -d ' ')"
          [ "$BEFORE_COUNT" = "1" ] || { echo "Expected exactly one image field for app '$APP' in $FILE, found $BEFORE_COUNT" >&2; exit 1; }

          yq -i '(.spec.template.spec.containers[] | select(.name == env(APP)) | .image) = env(IMAGE)' "$FILE"

          AFTER_MATCH_COUNT="$(yq -r '.spec.template.spec.containers[] | select(.name == env(APP) and .image == env(IMAGE)) | .image' "$FILE" | wc -l | tr -d ' ')"
          [ "$AFTER_MATCH_COUNT" = "1" ] || { echo "Mutation failed: expected exactly one intended image mutation in $FILE" >&2; exit 1; }

      - name: Enforce path integrity
        if: ${{ github.event_name != 'repository_dispatch' || env.DISPATCH_VALID == 'true' }}
        run: |
          set -euo pipefail
          FILE="overlays/${ENVIRONMENT}/${APP}/patch.yaml"
          test -f "$FILE"
          CHANGED_FILES="$(git diff --name-only)"
          if [ -z "$CHANGED_FILES" ]; then
            echo "No file changes produced for ${FILE}." >&2
            exit 1
          fi

          if [ "$CHANGED_FILES" != "$FILE" ]; then
            echo "Promotion must only change ${FILE}, but changed:" >&2
            echo "$CHANGED_FILES" >&2
            exit 1
          fi

      - name: Stop in dry-run mode
        if: ${{ (github.event_name != 'repository_dispatch' || env.DISPATCH_VALID == 'true') && env.DRY_RUN == 'true' }}
        run: |
          echo "Dry-run mode enabled; skipping PR creation."
          echo "Would promote ${APP} to ${ENVIRONMENT} with digest ${DIGEST}"

      # NOTE: This step is explicitly gated by DRY_RUN so the step above has
      # documented impact; the create-pull-request action is only reached in
      # live (non-dry-run) runs.
      - name: Create promotion pull request
        if: ${{ (github.event_name != 'repository_dispatch' || env.DISPATCH_VALID == 'true') && env.DRY_RUN != 'true' }}
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(${{ env.ENVIRONMENT }}): promote ${{ env.APP }}@${{ env.DIGEST }}"
          committer: Ethio Connect Bot <bot@ethio-connect.com>
          author: Ethio Connect Bot <bot@ethio-connect.com>
          signoff: true
          branch: "bot/promote-${{ env.ENVIRONMENT }}-${{ env.APP }}-${{ github.run_id }}"
          base: ${{ env.ENVIRONMENT }}
          title: "Promote ${{ env.APP }} to ${{ env.ENVIRONMENT }}"
          body: |
            Automated promotion PR.
            - app: `${{ env.APP }}`
            - env: `${{ env.ENVIRONMENT }}`
            - digest: `${{ env.DIGEST }}`
            - source_repo: `${{ env.SOURCE_REPO }}`
            - source_ref: `${{ env.SOURCE_REF }}`
            - source_commit: `${{ env.SOURCE_COMMIT }}`
            - release_id: `${{ env.RELEASE_ID }}`
