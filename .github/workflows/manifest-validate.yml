name: Manifest Validation

on:
  pull_request:
    branches: [testing, staging, production]
  push:
    branches: [testing, staging, production]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - uses: imranismail/setup-kustomize@f7351e0ce6b6fc22657b8356d7e07c843f2a2560
      - name: Kustomize build checks
        run: |
          kustomize build --enable-helm overlays/testing  >/tmp/testing.yaml
          kustomize build --enable-helm overlays/staging  >/tmp/staging.yaml
          kustomize build --enable-helm overlays/production >/tmp/production.yaml

      - name: Enforce runtime image reference policy
        shell: bash
        run: python3 .github/scripts/validate_runtime_images.py

      - name: Enforce bare-metal rollout annotations and limits
        shell: bash
        run: |
          set -euo pipefail
          for f in /tmp/testing.yaml /tmp/staging.yaml /tmp/production.yaml; do
            env_name="$(basename "$f" .yaml)"
            if ! grep -qEn 'ethio-connect.io/rollout-policy:' "$f"; then
              echo "Missing ethio-connect.io/rollout-policy annotation in ${env_name}" >&2
              exit 1
            fi
            if ! grep -qEn 'ethio-connect.io/baremetal-max-unavailable:' "$f"; then
              echo "Missing ethio-connect.io/baremetal-max-unavailable annotation in ${env_name}" >&2
              exit 1
            fi
            if ! grep -qEn 'maxUnavailable:' "$f"; then
              echo "Missing rollout maxUnavailable for ${env_name}" >&2
              exit 1
            fi
          done

      - name: Install Helm
        uses: azure/setup-helm@bf6a7d304bc2fdb57e0331155b7ebf2c504acf0a
      - name: Helm lint checks
        run: |
          helm lint charts/vendor-portal
          helm lint charts/customer-portal
          helm lint charts/central-hub
          helm lint charts/shared-infrastructure

      - name: Install kubeconform (pinned)
        shell: bash
        run: |
          set -euo pipefail
          VERSION=v0.6.7
          FILE=kubeconform-linux-amd64.tar.gz
          URL="https://github.com/yannh/kubeconform/releases/download/${VERSION}/${FILE}"
          EXPECTED_SHA256="95f14e87aa28c09d5941f11bd024c1d02fdc0303ccaa23f61cef67bc92619d73"
          curl -fsSL -o "$FILE" "$URL"
          echo "${EXPECTED_SHA256}  ${FILE}" | sha256sum -c -
          tar -xzf "$FILE" kubeconform
          sudo install -m 0755 kubeconform /usr/local/bin/kubeconform

      - name: Schema validation (kubeconform)
        run: kubeconform -strict -summary /tmp/testing.yaml /tmp/staging.yaml /tmp/production.yaml

      - name: Install conftest (pinned)
        shell: bash
        run: |
          set -euo pipefail
          VERSION=0.59.0
          FILE=conftest_${VERSION}_Linux_x86_64.tar.gz
          URL="https://github.com/open-policy-agent/conftest/releases/download/v${VERSION}/${FILE}"
          EXPECTED_SHA256="af879740a9b43aae21f928ed5d3571615c9d17b5d0551623a56d317812db0f98"
          curl -fsSL -o "$FILE" "$URL"
          echo "${EXPECTED_SHA256}  ${FILE}" | sha256sum -c -
          tar -xzf "$FILE" conftest
          sudo install -m 0755 conftest /usr/local/bin/conftest

      - name: Policy checks (conftest)
        run: |
          # 'policies' directory must exist in the manifest repo; skip gracefully if absent
          if [ -d policies ]; then
            conftest test /tmp/testing.yaml /tmp/staging.yaml /tmp/production.yaml --policy policies
          else
            echo "::warning::No 'policies' directory found; skipping conftest OPA checks."
          fi

  contract-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Install kustomize
        uses: imranismail/setup-kustomize@f7351e0ce6b6fc22657b8356d7e07c843f2a2560

      - name: Build manifests for contract validation
        run: |
          kustomize build --enable-helm overlays/testing  >/tmp/testing.yaml
          kustomize build --enable-helm overlays/staging  >/tmp/staging.yaml
          kustomize build --enable-helm overlays/production >/tmp/production.yaml

      - name: Install conftest (pinned)
        shell: bash
        run: |
          set -euo pipefail
          VERSION=0.59.0
          FILE=conftest_${VERSION}_Linux_x86_64.tar.gz
          URL="https://github.com/open-policy-agent/conftest/releases/download/v${VERSION}/${FILE}"
          EXPECTED_SHA256="af879740a9b43aae21f928ed5d3571615c9d17b5d0551623a56d317812db0f98"
          curl -fsSL -o "$FILE" "$URL"
          echo "${EXPECTED_SHA256}  ${FILE}" | sha256sum -c -
          tar -xzf "$FILE" conftest
          sudo install -m 0755 conftest /usr/local/bin/conftest

      - name: Replay promotion payload contract (dry-run)
        run: |
          if [ -d policies ]; then
            conftest test /tmp/testing.yaml /tmp/staging.yaml /tmp/production.yaml --policy policies
          else
            echo "::warning::No 'policies' directory found; skipping conftest OPA policy contract check."
          fi
