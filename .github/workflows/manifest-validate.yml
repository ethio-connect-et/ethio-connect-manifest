name: Manifest Validation

on:
  pull_request:
    branches: [testing, staging, production]
  push:
    branches: [testing, staging, production]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: imranismail/setup-kustomize@v2.1.0
      - name: Kustomize build checks
        run: |
          kustomize build --enable-helm overlays/testing >/tmp/testing.yaml
          kustomize build --enable-helm overlays/staging >/tmp/staging.yaml
          kustomize build --enable-helm overlays/production >/tmp/production.yaml

      - name: Enforce immutable/non-latest images
        run: |
          if rg -n 'image:\s+\S+:latest(\s|$)' /tmp/testing.yaml /tmp/staging.yaml /tmp/production.yaml; then
            echo "Found forbidden :latest image tags in rendered manifests" >&2
            exit 1
          fi

      - name: Install Helm
        uses: azure/setup-helm@v4.3.0
      - name: Helm lint checks
        run: |
          helm lint charts/vendor-portal
          helm lint charts/customer-portal
          helm lint charts/central-hub
          helm lint charts/shared-infrastructure

      - name: Install kubeconform (pinned)
        run: |
          set -euo pipefail
          VERSION=v0.6.7
          FILE=kubeconform-linux-amd64.tar.gz
          URL="https://github.com/yannh/kubeconform/releases/download/${VERSION}/${FILE}"
          EXPECTED_SHA256="95f14e87aa28c09d5941f11bd024c1d02fdc0303ccaa23f61cef67bc92619d73"
          curl -fsSL -o "$FILE" "$URL"
          echo "${EXPECTED_SHA256}  ${FILE}" | sha256sum -c -
          tar -xzf "$FILE" kubeconform
          sudo install -m 0755 kubeconform /usr/local/bin/kubeconform

      - name: Schema validation (kubeconform)
        run: kubeconform -strict -summary /tmp/testing.yaml /tmp/staging.yaml /tmp/production.yaml

      - name: Install conftest (pinned)
        run: |
          set -euo pipefail
          VERSION=0.59.0
          FILE=conftest_${VERSION}_Linux_x86_64.tar.gz
          URL="https://github.com/open-policy-agent/conftest/releases/download/v${VERSION}/${FILE}"
          EXPECTED_SHA256="af879740a9b43aae21f928ed5d3571615c9d17b5d0551623a56d317812db0f98"
          curl -fsSL -o "$FILE" "$URL"
          echo "${EXPECTED_SHA256}  ${FILE}" | sha256sum -c -
          tar -xzf "$FILE" conftest
          sudo install -m 0755 conftest /usr/local/bin/conftest

      - name: Policy checks (conftest)
        run: conftest test /tmp/testing.yaml /tmp/staging.yaml /tmp/production.yaml --policy policy

  contract-validation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Replay promotion payload contract (dry-run)
        run: |
          set -euo pipefail
          for ENVIRONMENT in testing staging production; do
            mapfile -t APPS < <(find "overlays/${ENVIRONMENT}" -mindepth 2 -maxdepth 2 -name patch.yaml -printf '%h\n' | xargs -n1 basename | sort -u)
            for APP in "${APPS[@]}"; do
              DIGEST="sha256:1111111111111111111111111111111111111111111111111111111111111111"
              FILE="overlays/${ENVIRONMENT}/${APP}/patch.yaml"
              IMAGE="ghcr.io/ethio-connect-et/${APP}@${DIGEST}"
              test -n "$APP"
              test -f "$FILE"
              grep -q "name: ${APP}" "$FILE"
              echo "$DIGEST" | grep -E '^sha256:[a-f0-9]{64}$'
              awk -v app="$APP" -v image="$IMAGE" '
                $0 ~ "name: " app { in_target=1 }
                in_target && $0 ~ /^[[:space:]]*image:/ { sub(/image:.*/, "image: " image); in_target=0 }
                { print }
              ' "$FILE" >/dev/null
            done
          done
