name: Manifest Validation

on:
  pull_request:
    branches: [testing, staging, production]
  push:
    branches: [testing, staging, production]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install ripgrep
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v rg &>/dev/null; then
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends ripgrep
          fi

      - uses: imranismail/setup-kustomize@2ba527d4d055ab63514ba50a99456fc35684947f
      - name: Kustomize build checks
        run: |
          kustomize build --enable-helm overlays/testing  >/tmp/testing.yaml
          kustomize build --enable-helm overlays/staging  >/tmp/staging.yaml
          kustomize build --enable-helm overlays/production >/tmp/production.yaml

      - name: Enforce production image hardening policy
        shell: bash
        run: |
          set -euo pipefail
          if rg -n 'image:\s+\S+:latest(\s|$)' /tmp/testing.yaml /tmp/staging.yaml /tmp/production.yaml; then
            echo "Found forbidden :latest image tags in rendered manifests" >&2
            exit 1
          fi
          if rg -n 'image:\s+[^@[:space:]]+:[^@[:space:]]+' /tmp/production.yaml; then
            echo "Production manifests must use digest-only image references (no mutable tags)." >&2
            exit 1
          fi
          if rg -qn 'image:\s+\S+@sha256:[a-f0-9]{64}' /tmp/production.yaml; then
            echo "Digest-only image references detected for production."
          else
            echo "No digest-pinned images found in production manifests." >&2
            exit 1
          fi

      - name: Enforce bare-metal rollout annotations and limits
        shell: bash
        run: |
          set -euo pipefail
          for f in /tmp/testing.yaml /tmp/staging.yaml /tmp/production.yaml; do
            env_name="$(basename "$f" .yaml)"
            if ! rg -qn 'ethio-connect.io/rollout-policy:' "$f"; then
              echo "Missing ethio-connect.io/rollout-policy annotation in ${env_name}" >&2
              exit 1
            fi
            if ! rg -qn 'ethio-connect.io/baremetal-max-unavailable:' "$f"; then
              echo "Missing ethio-connect.io/baremetal-max-unavailable annotation in ${env_name}" >&2
              exit 1
            fi
            if ! rg -qn 'maxUnavailable:' "$f"; then
              echo "Missing rollout maxUnavailable for ${env_name}" >&2
              exit 1
            fi
          done

      - name: Install Helm
        uses: azure/setup-helm@bf6a7d304bc2fdb57e0331155b7ebf2c504acf0a
      - name: Helm lint checks
        run: |
          helm lint charts/vendor-portal
          helm lint charts/customer-portal
          helm lint charts/central-hub
          helm lint charts/shared-infrastructure

      - name: Install kubeconform (pinned)
        shell: bash
        run: |
          set -euo pipefail
          VERSION=v0.6.7
          FILE=kubeconform-linux-amd64.tar.gz
          URL="https://github.com/yannh/kubeconform/releases/download/${VERSION}/${FILE}"
          EXPECTED_SHA256="95f14e87aa28c09d5941f11bd024c1d02fdc0303ccaa23f61cef67bc92619d73"
          curl -fsSL -o "$FILE" "$URL"
          echo "${EXPECTED_SHA256}  ${FILE}" | sha256sum -c -
          tar -xzf "$FILE" kubeconform
          sudo install -m 0755 kubeconform /usr/local/bin/kubeconform

      - name: Schema validation (kubeconform)
        run: kubeconform -strict -summary /tmp/testing.yaml /tmp/staging.yaml /tmp/production.yaml

      - name: Install conftest (pinned)
        shell: bash
        run: |
          set -euo pipefail
          VERSION=0.59.0
          FILE=conftest_${VERSION}_Linux_x86_64.tar.gz
          URL="https://github.com/open-policy-agent/conftest/releases/download/v${VERSION}/${FILE}"
          EXPECTED_SHA256="af879740a9b43aae21f928ed5d3571615c9d17b5d0551623a56d317812db0f98"
          curl -fsSL -o "$FILE" "$URL"
          echo "${EXPECTED_SHA256}  ${FILE}" | sha256sum -c -
          tar -xzf "$FILE" conftest
          sudo install -m 0755 conftest /usr/local/bin/conftest

      - name: Policy checks (conftest)
        run: |
          # 'policy' directory must exist in the manifest repo; skip gracefully if absent
          if [ -d policy ]; then
            conftest test /tmp/testing.yaml /tmp/staging.yaml /tmp/production.yaml --policy policy
          else
            echo "::warning::No 'policy' directory found; skipping conftest OPA checks."
          fi

  contract-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install kustomize
        uses: imranismail/setup-kustomize@2ba527d4d055ab63514ba50a99456fc35684947f

      - name: Build manifests for contract validation
        run: |
          kustomize build --enable-helm overlays/testing  >/tmp/testing.yaml
          kustomize build --enable-helm overlays/staging  >/tmp/staging.yaml
          kustomize build --enable-helm overlays/production >/tmp/production.yaml

      - name: Install conftest (pinned)
        shell: bash
        run: |
          set -euo pipefail
          VERSION=0.59.0
          FILE=conftest_${VERSION}_Linux_x86_64.tar.gz
          URL="https://github.com/open-policy-agent/conftest/releases/download/v${VERSION}/${FILE}"
          EXPECTED_SHA256="af879740a9b43aae21f928ed5d3571615c9d17b5d0551623a56d317812db0f98"
          curl -fsSL -o "$FILE" "$URL"
          echo "${EXPECTED_SHA256}  ${FILE}" | sha256sum -c -
          tar -xzf "$FILE" conftest
          sudo install -m 0755 conftest /usr/local/bin/conftest

      - name: Replay promotion payload contract (dry-run)
        run: |
          if [ -d policy ]; then
            conftest test /tmp/testing.yaml /tmp/staging.yaml /tmp/production.yaml --policy policy
          else
            echo "::warning::No 'policy' directory found; skipping conftest OPA policy contract check."
          fi
