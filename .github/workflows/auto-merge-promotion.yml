name: Auto-merge Promotion PRs

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches: [testing, staging, production]

jobs:
  enable-automerge:
    if: startsWith(github.head_ref, 'bot/promote-')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pull-requests: write
      contents: read
      checks: read
      statuses: read
    steps:
      - name: Verify validation checks succeeded for PR head SHA
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.payload.pull_request.head.sha;

            const checks = await github.paginate(github.rest.checks.listForRef, {
              owner, repo, ref: sha, per_page: 100
            });
            const statuses = await github.paginate(github.rest.repos.listCommitStatusesForRef, {
              owner, repo, ref: sha, per_page: 100
            });

            const requiredCheckRuns = ['Manifest Validation / validate', 'Manifest Validation / contract-validation'];
            for (const name of requiredCheckRuns) {
              const match = checks.find(c => c.name === name);
              if (!match) core.setFailed(`Missing required check run: ${name} on ${sha}`);
              else if (match.status !== 'completed' || match.conclusion !== 'success') {
                core.setFailed(`Check run not successful: ${name} (status=${match.status}, conclusion=${match.conclusion})`);
              }
            }

            const baseRef = context.payload.pull_request.base.ref;
            const requiredStatuses = baseRef === 'production'
              ? ['rollout/production-ready', 'approval/production-change-control']
              : ['rollout/environment-ready'];
            for (const statusName of requiredStatuses) {
              const status = statuses.find(s => s.context === statusName);
              if (!status) core.setFailed(`Missing required status context: ${statusName}`);
              else if (status.state !== 'success') core.setFailed(`Status context not successful: ${statusName} (${status.state})`);
            }

      - name: Enable auto-merge (branch protection aware)
        uses: peter-evans/enable-pull-request-automerge@a660677d5469627102a1c1e11409dd063606628d
        with:
          pull-request-number: ${{ github.event.pull_request.number }}
          merge-method: squash
