name: Auto-merge Promotion PRs

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches: [testing, staging, production]

jobs:
  enable-automerge:
    if: startsWith(github.head_ref, 'bot/promote-')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Enable auto-merge (branch protection aware)
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          pull-request-number: ${{ github.event.pull_request.number }}
          merge-method: squash
