name: Promotion Gate

on:
  pull_request:
    branches: [testing, staging, production]

permissions:
  contents: read

jobs:
  verify-promotion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - name: Validate promotion source metadata
        run: |
          test -n "${{ github.event.pull_request.head.sha }}"
          test -n "${{ github.event.pull_request.base.ref }}"
          echo "Promotion metadata validated for ${GITHUB_REF_NAME}."
