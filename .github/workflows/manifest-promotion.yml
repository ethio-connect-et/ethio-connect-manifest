name: Manifest Promotion

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        type: choice
        options: [testing, staging, production]
        required: true
      app:
        description: Name of the application to promote
        type: string
        required: true
      source_repo:
        description: Source repository
        required: true
      source_ref:
        description: Source git ref
        required: true
      source_commit:
        description: Source commit SHA
        required: true
      release_digest:
        description: Build/release digest (sha256:...)
        required: true

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  promote:
    runs-on: ubuntu-latest
    concurrency:
      group: manifest-promotion-${{ inputs.environment }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: Preserve promotion helper and checkout target branch
        run: |
          set -euo pipefail
          cp .github/scripts/promote_manifest.py /tmp/promote_manifest.py
          chmod +x /tmp/promote_manifest.py
          git fetch --no-tags origin "${{ inputs.environment }}"
          git checkout -B "${{ inputs.environment }}" "origin/${{ inputs.environment }}"

      - name: Apply manifest promotion changes
        id: promote
        run: |
          set -euo pipefail
          python3 /tmp/promote_manifest.py \
            --environment "${{ inputs.environment }}" \
            --app "${{ inputs.app }}" \
            --digest "${{ inputs.release_digest }}" \
            --attestation "audit/promotion-${{ inputs.environment }}-${{ github.run_id }}.json"
          patch_file="$(jq -r '.patch_file' "audit/promotion-${{ inputs.environment }}-${{ github.run_id }}.json")"
          echo "patch_file=${patch_file}" >> "$GITHUB_OUTPUT"

      - name: Verify promotion diff scope
        run: |
          set -euo pipefail
          expected="${{ steps.promote.outputs.patch_file }}"
          mapfile -t changed < <(git diff --name-only)
          if [ "${#changed[@]}" -ne 1 ] || [ "${changed[0]}" != "$expected" ]; then
            echo "::error::Promotion must change exactly ${expected}; actual changes: ${changed[*]:-none}"
            exit 1
          fi

      - name: Create promotion pull request
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(${{ inputs.environment }}): promote ${{ inputs.app }} to ${{ inputs.source_commit }}"
          branch: "bot/promote-${{ inputs.environment }}-${{ inputs.app }}-${{ github.run_id }}"
          base: ${{ inputs.environment }}
          title: "Promote ${{ inputs.app }} to ${{ inputs.environment }}"
          body: |
            Automated promotion PR.
            - app: `${{ inputs.app }}`
            - environment: `${{ inputs.environment }}`
            - source_commit: `${{ inputs.source_commit }}`
            - release_digest: `${{ inputs.release_digest }}`
            - promoted_by: `@${{ github.actor }}`

      - name: Extend promotion audit record
        run: |
          set -euo pipefail
          jq \
            --arg run_id "${{ github.run_id }}" \
            --arg run_attempt "${{ github.run_attempt }}" \
            --arg source_repository "${{ inputs.source_repo }}" \
            --arg source_ref "${{ inputs.source_ref }}" \
            --arg source_commit "${{ inputs.source_commit }}" \
            --arg promoted_by "${{ github.actor }}" \
            '. + {
              run_id: $run_id,
              run_attempt: $run_attempt,
              source_repository: $source_repository,
              source_ref: $source_ref,
              source_commit: $source_commit,
              promoted_by: $promoted_by
            }' "audit/promotion-${{ inputs.environment }}-${{ github.run_id }}.json" > audit/promotion.tmp
          mv audit/promotion.tmp "audit/promotion-${{ inputs.environment }}-${{ github.run_id }}.json"

      - name: Upload audit artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: promotion-audit-${{ inputs.environment }}-${{ github.run_id }}
          path: audit/promotion-${{ inputs.environment }}-${{ github.run_id }}.json
          if-no-files-found: error
          retention-days: 90
          compression-level: 6
