name: Source Repo Integration Contract

on:
  workflow_dispatch:
  pull_request:
    branches: [testing, staging, production]
  push:
    branches: [testing, staging, production]

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  contract:
    name: Validate ethio-connect dispatch handoff
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
    steps:
      - name: Checkout manifests
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 1

      - name: Assert environment branches and overlay directories exist
        run: |
          set -euo pipefail
          for env in testing staging production; do
            test -d "overlays/${env}" || { echo "::error::Missing overlays/${env}"; exit 1; }
            count="$(find "overlays/${env}" -mindepth 2 -maxdepth 2 -name patch.yaml | wc -l | tr -d ' ')"
            [ "$count" -gt 0 ] || { echo "::error::No app patch.yaml files under overlays/${env}"; exit 1; }
          done

      - name: Assert dispatch app names map to image/deployment names
        run: |
          set -euo pipefail
          for env in testing staging production; do
            while IFS= read -r app; do
              [ -n "$app" ] || continue
              python3 .github/scripts/promote_manifest.py \
                --environment "$env" \
                --app "$app" \
                --digest "sha256:$(printf 'd%.0s' {1..64})" \
                --attestation "/tmp/${env}-${app}.json" >/dev/null
              git checkout -- "overlays/${env}"
            done < <(find "overlays/${env}" -mindepth 2 -maxdepth 2 -name patch.yaml -print0 \
              | xargs -0 awk '/image: ghcr.io\/ethio-connect-et\// { image=$2; sub(/^ghcr.io\/ethio-connect-et\//, "", image); sub(/[@:].*/, "", image); print image }' \
              | sort -u)
          done

      - name: Assert production images are digest-pinned GHCR references
        run: |
          set -euo pipefail
          errors=0
          while IFS= read -r line; do
            if ! grep -Eq 'image:[[:space:]]+ghcr\.io/ethio-connect-et/[a-z0-9][a-z0-9._-]*@sha256:[a-f0-9]{64}$' <<<"$line"; then
              echo "::error::Invalid production image reference: ${line}"
              errors=$((errors + 1))
            fi
          done < <(find overlays/production -mindepth 2 -maxdepth 2 -name patch.yaml -print0 | xargs -0 awk '/image: ghcr.io\// { print }')
          [ "$errors" -eq 0 ]

      - name: Print expected source-to-manifest contract
        run: |
          cat <<'EOF'
          Source repository: ethio-connect-et/ethio-connect
          Target repository: ethio-connect-et/ethio-connect-manifest
          Event type: promote-image

          Current source repo workflow alignment:
          - ci.yml publishes container images on pushes to testing, staging, and main.
          - scripts/manifest-dispatch.sh maps testing -> testing, staging -> staging, main -> production.
          - The source dispatch currently sends the minimum payload: app, digest, env.
          - This manifest repo accepts optional source_repo/source_ref/source_commit/release metadata when the source repo is upgraded.

          Minimum repository_dispatch payload:
          {
            "event_type": "promote-image",
            "client_payload": {
              "app": "<docker target app name, e.g. vendor-portal-api>",
              "digest": "sha256:<64hex>",
              "env": "testing|staging|production"
            }
          }
          EOF
