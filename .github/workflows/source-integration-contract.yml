name: Source Repo Integration Contract

on:
  workflow_dispatch:

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - name: Expected payload contract
        run: |
          echo 'Source repository must send repository_dispatch event with only:'
          echo '{"event_type":"promote-image","client_payload":{"app":"<app>","digest":"sha256:<64hex>","env":"testing|staging|production"}}'
          echo 'Do not use broad git mutations such as `git add .` in source-repo automation.'
