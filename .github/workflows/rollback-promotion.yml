name: Rollback Promotion

on:
  workflow_dispatch:
    inputs:
      app:
        description: Application name
        required: true
        type: string
      env:
        description: Environment to rollback
        required: true
        type: choice
        options:
          - testing
          - staging
          - production
      previous_good_digest:
        description: Verifiable previous-good digest sha256:...
        required: true
        type: string
      change_ticket:
        description: Change ticket/reference for audit trail
        required: true
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      actions: write
      pull-requests: write
    env:
      APP: ${{ github.event.inputs.app }}
      ENVIRONMENT: ${{ github.event.inputs.env }}
      PREV_DIGEST: ${{ github.event.inputs.previous_good_digest }}
      CHANGE_TICKET: ${{ github.event.inputs.change_ticket }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Validate rollback contract input
        run: |
          set -euo pipefail
          echo "$PREV_DIGEST" | grep -E '^sha256:[a-f0-9]{64}$'
          test -n "$CHANGE_TICKET"

      - name: Preserve promotion helper and checkout target branch
        run: |
          set -euo pipefail
          cp .github/scripts/promote_manifest.py /tmp/promote_manifest.py
          chmod +x /tmp/promote_manifest.py
          git fetch --no-tags origin "${ENVIRONMENT}"
          git checkout -B "${ENVIRONMENT}" "origin/${ENVIRONMENT}"

      - name: Verify previous-good digest exists in git history
        run: |
          set -euo pipefail
          FILE="$(python3 /tmp/promote_manifest.py --environment "${ENVIRONMENT}" --app "${APP}" --digest "${PREV_DIGEST}" --attestation /tmp/rollback-probe.json | jq -r '."patch_file"')"
          git checkout -- "$FILE"
          if ! git log --follow -p -- "$FILE" | grep -F "$PREV_DIGEST" >/dev/null; then
            echo "Digest ${PREV_DIGEST} has no verifiable history in ${FILE}" >&2
            exit 1
          fi

      - name: Apply rollback digest
        run: |
          set -euo pipefail
          python3 /tmp/promote_manifest.py \
            --environment "${ENVIRONMENT}" \
            --app "${APP}" \
            --digest "${PREV_DIGEST}" \
            --attestation artifacts/rollback-attestation.json

      - name: Emit rollback attestation artifact
        run: |
          set -euo pipefail
          mkdir -p artifacts
          jq \
            --arg change_ticket "${CHANGE_TICKET}" \
            --arg requested_by "${{ github.actor }}" \
            --arg run_id "${{ github.run_id }}" \
            '. + {
              rollback_digest: .digest,
              change_ticket: $change_ticket,
              requested_by: $requested_by,
              run_id: $run_id
            }' artifacts/rollback-attestation.json > artifacts/rollback-attestation.tmp
          mv artifacts/rollback-attestation.tmp artifacts/rollback-attestation.json

      - name: Upload rollback attestation
        # Pinned to SHA for supply-chain security; corresponds to actions/upload-artifact@v4
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: rollback-attestation-${{ env.ENVIRONMENT }}-${{ env.APP }}
          path: artifacts/rollback-attestation.json
          if-no-files-found: error
          retention-days: 180
          compression-level: 6

      - name: Create rollback pull request
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(${{ env.ENVIRONMENT }}): rollback ${{ env.APP }} to ${{ env.PREV_DIGEST }}"
          branch: "bot/rollback-${{ env.ENVIRONMENT }}-${{ env.APP }}-${{ github.run_id }}"
          base: ${{ env.ENVIRONMENT }}
          title: "Rollback ${{ env.APP }} in ${{ env.ENVIRONMENT }}"
          body: |
            Automated rollback PR.
            - app: `${{ env.APP }}`
            - env: `${{ env.ENVIRONMENT }}`
            - previous_good_digest: `${{ env.PREV_DIGEST }}`
            - change_ticket: `${{ env.CHANGE_TICKET }}`
