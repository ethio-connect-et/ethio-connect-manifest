name: Promotion Reconciler

on:
  push:
    branches:
      - main
    paths:
      - 'intents/**'
  workflow_dispatch:

concurrency:
  group: reconciler
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: sudo snap install yq

      - name: Process Intents
        id: process
        shell: bash
        run: |
          set -euo pipefail
          
          CHANGES=0
          PROCESSED_APPS=()
          
          for env_dir in intents/*; do
            [ -d "$env_dir" ] || continue
            env="$(basename "$env_dir")"
            
            for intent_file in "$env_dir"/*.json; do
              [ -f "$intent_file" ] || continue
              
              app="$(jq -r .app "$intent_file")"
              digest="$(jq -r .digest "$intent_file")"
              
              # Resolve target file
              patch_file="overlays/${env}/${app}/patch.yaml"
              if [ ! -f "$patch_file" ]; then
                echo "::warning::Skipping intent for ${app} to ${env}: patch file not found."
                git rm "$intent_file"
                continue
              fi
              
              # Mutate
              image="ghcr.io/ethio-connect-et/${app}@${digest}"
              yq -i '(.spec.template.spec.containers[] | select(.name == "'"$app"'") | .image) = "'"$image"'"' "$patch_file"
              
              # Clean up intent
              git rm "$intent_file"
              CHANGES=1
              PROCESSED_APPS+=("${app}")
            done
          done
          
          if [ "$CHANGES" -eq 1 ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
            UNIQUE_APPS=$(printf "%s\n" "${PROCESSED_APPS[@]}" | sort -u | paste -sd, -)
            echo "apps=$UNIQUE_APPS" >> "$GITHUB_OUTPUT"
          else
            echo "changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitOps PR
        if: steps.process.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(gitops): reconcile promotion intents"
          committer: Ethio Connect Bot <bot@ethio-connect.com>
          author: Ethio Connect Bot <bot@ethio-connect.com>
          signoff: true
          branch: "bot/reconcile-intents"
          base: main
          title: "GitOps: Reconcile Promotions for ${{ steps.process.outputs.apps }}"
          body: |
            Automated GitOps reconciliation PR.
            Processes and consumes pending intents.
