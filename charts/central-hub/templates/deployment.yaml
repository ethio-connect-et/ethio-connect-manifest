apiVersion: apps/v1
kind: Deployment
metadata:
  name: central-hub-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: central-hub
      runtime: api
  template:
    metadata:
      labels:
        app: central-hub
        runtime: api
    spec:
      containers:
        - name: central-hub-api
          image: ghcr.io/ethioconnect/central-hub-api:latest
          ports:
            - containerPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: central-hub-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: central-hub
      runtime: web
  template:
    metadata:
      labels:
        app: central-hub
        runtime: web
    spec:
      containers:
        - name: central-hub-dashboard
          image: ghcr.io/ethioconnect/central-hub-dashboard:latest
          ports:
            - containerPort: 3000
