apiVersion: v1
kind: Service
metadata:
  name: central-hub-api
spec:
  selector:
    app: central-hub
    runtime: api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: central-hub-web
spec:
  selector:
    app: central-hub
    runtime: web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
