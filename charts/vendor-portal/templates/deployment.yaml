    ethio-connect.et/rollout-policy: "bare-metal-safe"
    ethio-connect.et/baremetal-max-unavailable: "1"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  selector:
    matchLabels:
      app: vendor-portal
      runtime: web
  template:
    metadata:
      labels:
        app: vendor-portal
        runtime: web
    spec:
      containers:
        - name: vendor-portal-dashboard
          image: {{ .Values.images.dashboard.repository }}{{ if .Values.images.dashboard.digest }}@{{ .Values.images.dashboard.digest }}{{ else }}:{{ .Values.images.dashboard.tag }}{{ end }}
          ports:
            - containerPort: 3000
---
