apiVersion: apps/v1
kind: Deployment
metadata:
  name: vendor-portal-api
  annotations:
    ethio-connect.et/rollout-policy: "bare-metal-safe"
    ethio-connect.et/baremetal-max-unavailable: "1"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  selector:
    matchLabels:
      app: vendor-portal
      runtime: api
  template:
    metadata:
      labels:
        app: vendor-portal
        runtime: api
    spec:
      containers:
        - name: vendor-portal-api
          image: {{ .Values.images.api.repository }}{{ if .Values.images.api.digest }}@{{ .Values.images.api.digest }}{{ else }}:{{ .Values.images.api.tag }}{{ end }}
          ports:
            - containerPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
