apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-portal-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-portal
      runtime: api
  template:
    metadata:
      labels:
        app: customer-portal
        runtime: api
    spec:
      containers:
        - name: customer-portal-api
          image: ghcr.io/ethioconnect/customer-portal-api:latest
          ports:
            - containerPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-portal-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-portal
      runtime: web
  template:
    metadata:
      labels:
        app: customer-portal
        runtime: web
    spec:
      containers:
        - name: customer-portal-dashboard
          image: ghcr.io/ethioconnect/customer-portal-dashboard:latest
          ports:
            - containerPort: 3000
