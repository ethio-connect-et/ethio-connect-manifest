apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-portal-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-portal
      runtime: api
  template:
    metadata:
      labels:
        app: customer-portal
        runtime: api
    spec:
      containers:
        - name: customer-portal-api
          image: {{ .Values.images.api.repository }}{{ if .Values.images.api.digest }}@{{ .Values.images.api.digest }}{{ else }}:{{ .Values.images.api.tag }}{{ end }}
          ports:
            - containerPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-portal-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-portal
      runtime: web
  template:
    metadata:
      labels:
        app: customer-portal
        runtime: web
    spec:
      containers:
        - name: customer-portal-dashboard
          image: {{ .Values.images.dashboard.repository }}{{ if .Values.images.dashboard.digest }}@{{ .Values.images.dashboard.digest }}{{ else }}:{{ .Values.images.dashboard.tag }}{{ end }}
          ports:
            - containerPort: 3000
