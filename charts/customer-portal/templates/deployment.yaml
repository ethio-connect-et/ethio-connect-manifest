apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-portal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-portal
  template:
    metadata:
      labels:
        app: customer-portal
    spec:
      containers:
        - name: customer-portal
          image: ghcr.io/ethioconnect/customer-portal:latest
          ports:
            - containerPort: 3000
