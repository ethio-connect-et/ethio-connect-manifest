apiVersion: v1
kind: Service
metadata:
  name: customer-portal-api
spec:
  selector:
    app: customer-portal
    runtime: api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: customer-portal-web
spec:
  selector:
    app: customer-portal
    runtime: web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
