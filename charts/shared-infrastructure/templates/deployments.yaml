apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  annotations:
    ethio-connect.et/rollout-policy: "bare-metal-safe"
    ethio-connect.et/baremetal-max-unavailable: "1"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: {{ .Values.images.keycloak.repository }}{{ if .Values.images.keycloak.digest }}@{{ .Values.images.keycloak.digest }}{{ else }}:{{ .Values.images.keycloak.tag }}{{ end }}
          ports:
            - containerPort: 8080
---
