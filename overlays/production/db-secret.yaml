# SECURITY WARNING: Do NOT commit real credentials to this file.
# This file is a placeholder that documents the Secret structure.
# On the target Ubuntu baremetal server, secrets must be injected via:
#   kubectl create secret generic db-credentials \
#     --from-literal=username="$DB_USERNAME" \
#     --from-literal=password="$DB_PASSWORD" \
#     --namespace=production \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Or use external-secrets-operator with a backend (Vault, AWS Secrets Manager, etc.)
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  annotations:
    # managed-by annotation signals this secret must NOT be managed via GitOps plain-text
    ethio-connect.io/secret-management: external
type: Opaque
# stringData intentionally left empty - credentials are injected out-of-band.
# Applying this manifest will NOT overwrite an already-existing secret on the cluster.
stringData: {}
