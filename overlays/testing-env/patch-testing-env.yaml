# Patch for testing environment: use test image tags and lower resources
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vendor-portal-api
spec:
  template:
    spec:
      containers:
        - name: vendor-portal-api
          image: ghcr.io/ethio-connect-et/vendor-portal-api:test
          resources:
            limits:
              cpu: "250m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
