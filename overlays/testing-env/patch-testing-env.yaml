# Patch for testing environment: use test image tags and lower resources
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vendor-portal
spec:
  template:
    spec:
      containers:
        - name: vendor-portal
          image: ghcr.io/ethioconnect/vendor-portal:test
          resources:
            limits:
              cpu: "250m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
